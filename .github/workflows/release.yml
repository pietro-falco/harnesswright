name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      # npm >=11.5.1 required for OIDC trusted publishing; provenance is automatic
      - run: npm install -g npm@11.5.1
      - run: npm --version
      - run: npm ci
      - run: npm run build
      - run: npm test
      # deterministic gate before publish — CI invokes gate; no claim invokes gate (re-entrancy guard stays intact)
      - run: node dist/cli.js gate
      - run: npm publish
